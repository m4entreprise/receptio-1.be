version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: receptio-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-receptio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-receptio123}
      POSTGRES_DB: ${POSTGRES_DB:-receptio}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receptio"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: receptio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
